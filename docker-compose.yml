services:
  kiwi:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: kiwi
    restart: unless-stopped
    ports:
      - "${PORT_API_HOST:-4001}:3007"
    volumes:
      - uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - PORT_API=${PORT_API:-3007}
      - MONGO_PROD=${MONGO_PROD}
      - APP_URL=${APP_URL:-http://localhost:4001}
      - SECRET_TOKEN=${SECRET_TOKEN}
      - CHECKOUT_CURRENCY=${CHECKOUT_CURRENCY:-USD}
      - CHECKOUT_TAX_RATE=${CHECKOUT_TAX_RATE:-0}
      - CHECKOUT_DELIVERY_FEE=${CHECKOUT_DELIVERY_FEE:-0}
      - CHECKOUT_FREE_DELIVERY_THRESHOLD=${CHECKOUT_FREE_DELIVERY_THRESHOLD:-0}
      - REVIEW_ELIGIBLE_ORDER_STATUSES=${REVIEW_ELIGIBLE_ORDER_STATUSES:-}
      - REVIEW_VERIFIED_ORDER_MODE=${REVIEW_VERIFIED_ORDER_MODE:-RELAXED}
    command: node dist/apps/kiwi/main
    networks:
      - monorepo-network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "node -e \"const net=require('net');const s=net.connect(3007,'localhost',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  kiwi-batch:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: kiwi-batch
    restart: unless-stopped
    ports:
      - "${PORT_BATCH_HOST:-4002}:3008"
    volumes:
      - uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - PORT_BATCH=${PORT_BATCH:-3008}
      - MONGO_PROD=${MONGO_PROD}
    command: node dist/apps/kiwi-batch/main
    networks:
      - monorepo-network
    depends_on:
      kiwi:
        condition: service_healthy

networks:
  monorepo-network:
    name: monorepo-network
    driver: bridge

volumes:
  uploads:
